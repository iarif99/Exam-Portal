<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#090c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" id="manifest-link">
<title>Pro Exam Portal - Premium Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Tiro+Bangla&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  /* ALL YOUR ORIGINAL CSS IS UNTOUCHED */
  :root { 
    --bg: #090c10; 
    --card-bg: rgba(22, 27, 34, 0.85);
    --border: #30363d;
    --accent: #f5a623; 
    --correct: #238636; 
    --wrong: #da3633; 
    --text: #e6edf3; 
    --muted: #8b949e;
  }

  * { box-sizing: border-box; transition: all 0.3s ease; }
  
  body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Hind Siliguri', sans-serif; 
    margin: 0; line-height: 1.8; overflow-x: hidden;
  }

  .en-text, #timer, .option-label, .sub-card b, .stat-value { font-family: 'Outfit', sans-serif; }

  /* 💎 GEN Z GLASSMORPHISM OVERLOAD 💎 */
  .sub-card, .question-card, .stat-card {
      backdrop-filter: blur(20px) !important;
      border: 0.5px solid rgba(255, 255, 255, 0.2) !important;
  }

  /* 📸 STORY RECEIPT OVERLAY 📸 */
  #receipt-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
      z-index: 100000; display: none; align-items: center; justify-content: center;
      flex-direction: column; opacity: 0; transition: opacity 0.4s ease;
  }
  .story-receipt {
      width: 340px; height: 650px; background: linear-gradient(145deg, rgba(22, 27, 34, 0.9), rgba(13, 17, 23, 0.9));
      border-radius: 20px; border: 0.5px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 50px rgba(245, 166, 35, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.05);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; color: #fff; font-family: 'Outfit', sans-serif; position: relative;
      overflow: hidden;
  }
  .receipt-lines {
      width: 100%; height: 2px; background: repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(255,255,255,0.2) 10px, rgba(255,255,255,0.2) 20px);
      margin: 20px 0;
  }
  .story-btn {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: #fff; padding: 15px 40px; border-radius: 50px; font-weight: 800; border: none; font-size: 20px;
      cursor: pointer; display: block; margin: 30px auto 10px auto; width: fit-content; text-transform: uppercase;
      box-shadow: 0 8px 25px rgba(220, 39, 67, 0.4); animation: constantPulse 2.5s infinite; transition: transform 0.3s;
  }
  .story-btn:hover { transform: scale(1.05); }

  #arif-wm {
    position: fixed; font-family: 'Outfit'; font-weight: 800; font-size: 16px; 
    pointer-events: none; z-index: 10000; letter-spacing: 3px; 
    color: var(--accent); text-shadow: 0 2px 10px rgba(245, 166, 35, 0.4); opacity: 0.9;
    bottom: 20px;
  }
  .wm-right { left: 100%; transform: translateX(calc(-100% - 20px)); transition: left 1.2s cubic-bezier(0.65, 0, 0.35, 1), transform 1.2s cubic-bezier(0.65, 0, 0.35, 1); }
  .wm-left { left: 20px; transform: translateX(0); transition: left 1.2s cubic-bezier(0.65, 0, 0.35, 1), transform 1.2s cubic-bezier(0.65, 0, 0.35, 1); }

  .bg-grid {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
    background: 
      linear-gradient(rgba(13, 17, 23, 0.9), rgba(13, 17, 23, 0.9)),
      linear-gradient(transparent 95%, rgba(245, 166, 35, 0.08) 95%),
      linear-gradient(90deg, transparent 95%, rgba(245, 166, 35, 0.08) 95%);
    background-size: 100% 100%, 40px 40px, 40px 40px;
  }
  .glow-orb {
    position: absolute; top: 20%; left: 50%; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(245,166,35,0.1) 0%, transparent 65%);
    transform: translate(-50%, -50%); animation: orbFloat 6s infinite alternate ease-in-out; z-index: -1;
  }
  @keyframes orbFloat { 100% { transform: translate(-50%, -40%) scale(1.2); } }

  .page-container { opacity: 1; transform: translateY(0); transition: opacity 0.5s ease, transform 0.5s ease; }
  .page-container.hidden-anim { opacity: 0; transform: translateY(30px); pointer-events: none; }

  #home-page { max-width: 1000px; margin: 0 auto; padding: 60px 20px; text-align: center; position: relative; }
  .main-title { font-family: 'Tiro Bangla', serif; font-size: 55px; color: #fff; margin-bottom: 5px; text-shadow: 0 4px 20px rgba(245,166,35,0.4); letter-spacing: 2px; }

  .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 50px 0; }
  .sub-card { 
    background: rgba(22, 27, 34, 0.6); backdrop-filter: blur(10px);
    border: 1px solid rgba(245, 166, 35, 0.2); padding: 30px; border-radius: 20px; cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .sub-card:hover { transform: translateY(-15px) scale(1.05); box-shadow: 0 15px 35px rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.6); }
  .sub-card b { font-size: 24px; color: #fff; display: block; }
  .sub-card span { color: var(--accent); font-weight: bold; }

  .start-btn {
    padding: 20px 60px; font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--accent), #e07b00);
    border: none; color: #000; border-radius: 50px; cursor: pointer; margin-top: 30px;
    animation: constantPulse 2.5s infinite;
  }
  @keyframes constantPulse {
    0% { transform: scale(1); box-shadow: 0 4px 15px rgba(245,166,35,0.3); }
    50% { transform: scale(1.05); box-shadow: 0 8px 25px rgba(245,166,35,0.5); }
    100% { transform: scale(1); box-shadow: 0 4px 15px rgba(245,166,35,0.3); }
  }

  .question-card {
    background: var(--card-bg); padding: 35px; border-radius: 18px;
    margin: 30px 0; border: 1px solid var(--border); position: relative;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); backdrop-filter: blur(5px);
  }
  
  .question-text { font-size: 22px; font-weight: 600; margin-bottom: 25px; display: block; }

  .option-label {
    display: block; position: relative; background: #1c2128; padding: 18px 25px;
    border-radius: 12px; margin: 12px 0; border: 1px solid var(--border);
    border-bottom: 4px solid #000; cursor: pointer; font-size: 18px; overflow: hidden;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s, border-color 0.3s;
  }
  .option-label:hover { 
    transform: scale(1.04) translateX(15px);
    background: #21262d; border-color: rgba(245,166,35,0.5); 
    box-shadow: -5px 10px 20px rgba(0,0,0,0.4); z-index: 10; 
  }
  .option-label input { margin-right: 15px; transform: scale(1.2); pointer-events: none; }
  .option-label:has(input:checked) { background: rgba(35, 134, 54, 0.15); border-color: var(--correct); border-bottom: 4px solid #144e20; color: #fff; }

  #subject-headline {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(13, 17, 23, 0.95); padding: 10px 40px; text-align: center;
    font-size: 22px; font-weight: 800; color: var(--accent); border-radius: 30px;
    border: 1px solid rgba(245,166,35,0.5); box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    z-index: 999; opacity: 0; pointer-events: none;
  }

  #timer-wrapper {
    position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px 25px;
    border-radius: 10px; z-index: 1000; font-weight: 800; font-size: 24px; color: #fff;
    border: 2px solid #238636; box-shadow: 0 4px 15px rgba(35,134,54,0.3); backdrop-filter: blur(5px);
    transition: opacity 0.5s ease, border-color 1s, box-shadow 1s; opacity: 0; display: none;
  }

  #top-left-submit {
    position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 25px;
    border-radius: 10px; z-index: 1000; font-weight: 800; font-size: 24px; color: #fff;
    border: 2px solid #da3633; box-shadow: 0 4px 15px rgba(218,54,51,0.3); backdrop-filter: blur(5px);
    transition: opacity 0.5s ease, background 0.3s, transform 0.2s; opacity: 0; display: none;
    cursor: pointer; font-family: 'Outfit', sans-serif; letter-spacing: 2px;
  }
  #top-left-submit:hover { background: rgba(218, 54, 51, 0.2); transform: scale(1.05); }

  .finish-btn {
    position: fixed;
    background: linear-gradient(135deg, #da3633, #a02020); color: #fff;
    border: none; font-weight: 800; cursor: pointer;
    box-shadow: 0 8px 20px rgba(218,54,51,0.3); z-index: 1000;
    opacity: 0.5; transition: opacity 0.4s ease, filter 0.3s ease;
    letter-spacing: 1px;
  }
  
  .finish-btn.bottom-center { bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 40px; border-radius: 50px; font-size: 18px; }
  .finish-btn.side-sticky { top: 50%; right: 0; transform: translateY(-50%); padding: 20px 10px; font-size: 16px; border-radius: 10px 0 0 10px; writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 4px; } 
  .finish-btn:hover { opacity: 1; filter: brightness(1.2); }

  @keyframes heartbeatAnim {
    0% { filter: brightness(1); box-shadow: 0 4px 15px rgba(218,54,51,0.3); }
    15% { filter: brightness(1.3); box-shadow: 0 8px 25px rgba(218,54,51,0.6); }
    30% { filter: brightness(1); box-shadow: 0 4px 15px rgba(218,54,51,0.3); }
    45% { filter: brightness(1.3); box-shadow: 0 8px 25px rgba(218,54,51,0.6); }
    100% { filter: brightness(1); box-shadow: 0 4px 15px rgba(218,54,51,0.3); }
  }
  .heartbeat-active { animation: heartbeatAnim 1.5s ease-in-out infinite; opacity: 1 !important; }

  body.red-alert::before {
    content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    box-shadow: inset 0 0 50px rgba(218, 54, 51, 0.4); z-index: 9999; pointer-events: none;
    animation: cornerGlow 1.5s infinite ease-in-out;
  }
  @keyframes cornerGlow {
    0% { box-shadow: inset 0 0 30px rgba(218, 54, 51, 0.3); }
    50% { box-shadow: inset 0 0 80px rgba(218, 54, 51, 0.6), inset 0 0 20px rgba(255, 100, 100, 0.3); }
    100% { box-shadow: inset 0 0 30px rgba(218, 54, 51, 0.3); }
  }

  .result-container { max-width: 900px; margin: 40px auto; padding: 40px; background: rgba(13, 17, 23, 0.7); border-radius: 20px; border: 1px solid rgba(245,166,35,0.4); text-align: center; backdrop-filter: blur(15px); position: relative; z-index: 2; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  .score-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
  .liquid-score-wrapper { margin: 0 auto; width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--accent); overflow: hidden; position: relative; background: #000; box-shadow: 0 8px 25px rgba(245,166,35,0.25); }
  .liquid-wave { position: absolute; left: -50%; top: 50%; width: 200%; height: 200%; background: rgba(245, 166, 35, 0.85); border-radius: 40%; animation: spinWave 5s linear infinite; transition: top 2s ease, background 1s ease; }
  .score-text-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 900; color: #fff; z-index: 2; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
  @keyframes spinWave { 100% { transform: rotate(360deg); } }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
  .stat-card { padding: 20px; background: rgba(0,0,0,0.6); border-radius: 15px; border: 1px solid var(--border); box-shadow: inset 0 0 20px rgba(255,255,255,0.02); }
  .stat-value { font-size: 42px; font-weight: 800; display: block; margin-bottom: 5px; }

  .btn-3d { flex: 1; padding: 15px 20px; border-radius: 12px; font-weight: 800; font-family: 'Outfit'; border: none; color: white; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; font-size: 16px; }
  .btn-green { background: #2ea043; box-shadow: 0 6px 0 #185e24; }
  .btn-red { background: #da3633; box-shadow: 0 6px 0 #8e1f1d; }
  .active-glow.btn-green { box-shadow: 0 4px 20px rgba(46,160,67,0.4), 0 6px 0 #185e24; filter: brightness(1.1); transform: translateY(-2px); }
  .active-glow.btn-red { box-shadow: 0 4px 20px rgba(218,54,51,0.4), 0 6px 0 #8e1f1d; filter: brightness(1.1); transform: translateY(-2px); }
  .dimmed { opacity: 0.5; filter: grayscale(60%); transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.5) !important; }

  .action-btn-group { display: flex; justify-content: center; gap: 20px; }

  .toggle-container { display: inline-flex; align-items: center; justify-content: center; gap: 15px; font-family: 'Outfit'; font-weight: bold; background: rgba(0,0,0,0.5); padding: 12px 25px; border-radius: 50px; border: 1px solid var(--border); margin: 10px 10px 30px 10px; }
  .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .4s; border-radius: 34px; border: 1px solid #000; }
  .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--accent); box-shadow: 0 2px 10px rgba(245,166,35,0.4); }
  input:checked + .slider:before { transform: translateX(26px); }
  #neg-toggle:checked + .slider { background-color: var(--wrong); box-shadow: 0 2px 10px rgba(218,54,51,0.4); }

  .subject-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; text-align: left; }
  .sub-stat-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
  .sub-stat-box p { margin: 0 0 10px 0; font-weight: bold; font-family: 'Outfit'; }
  .water-bar { height: 15px; width: 100%; background: #161b22; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #30363d; }
  .water-fill { height: 100%; width: 0%; position: absolute; left: 0; top: 0; background-size: 200% 100%; animation: flowWater 2s infinite linear; transition: width 1.5s ease; }
  @keyframes flowWater { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  .explanation-box { margin-top: 20px; padding: 20px; border-radius: 12px; display: none; background: rgba(30, 58, 138, 0.2); color: #93c5fd; border: 1px solid rgba(30, 58, 138, 0.5); font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.4s, color 0.4s, border-color 0.4s, box-shadow 0.4s; position: relative; text-align: center; transform-origin: center center; z-index: 1; }
  .explanation-box:hover { transform: scale(2); z-index: 999; background: #1e40af; color: #ffffff; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border-color: #3b82f6; }
  .question-card.review-mode:has(.explanation-box:hover) .option-label:not(.correct-ans) { opacity: 0 !important; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
  .correct-ans { background: #144e20 !important; border-color: var(--correct) !important; color: #fff; box-shadow: 0 4px 15px rgba(35,134,54,0.3); }
  .wrong-ans { background: #5c1818 !important; border-color: var(--wrong) !important; color: #fff; opacity: 0.7; }

  body.force-mobile * { backdrop-filter: none !important; box-shadow: none !important; }
  body.force-mobile .bg-grid, body.force-mobile .glow-orb { display: none !important; } 
  body.force-mobile { background: #000; }
  body.force-mobile #home-page { max-width: 450px; padding: 40px 15px; }
  body.force-mobile #exam-area { max-width: 450px; padding: 15px; padding-bottom: 90px; }
  body.force-mobile .result-container { max-width: 450px; padding: 20px; background: #0d1117; border: 1px solid var(--border); }
  body.force-mobile .subject-grid { grid-template-columns: 1fr; gap: 15px; margin: 30px 0; }
  body.force-mobile .sub-card { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #161b22; }
  body.force-mobile .sub-card b { font-size: 18px; margin: 0; }
  body.force-mobile .main-title { font-size: 35px; text-shadow: none; }
  body.force-mobile .start-btn { padding: 15px 30px; font-size: 20px; width: 100%; animation: none; border: 1px solid var(--accent); margin-top: 30px !important; }
  body.force-mobile .question-card { padding: 20px; margin: 20px 0; background: #0d1117; }
  body.force-mobile .question-text { font-size: 18px; }
  body.force-mobile .option-label { padding: 12px 15px; font-size: 16px; margin: 8px 0; }
  body.force-mobile .option-label:hover { transform: none; } 
  body.force-mobile #timer-wrapper { font-size: 18px; padding: 8px 15px; right: 10px; top: 10px; background: #000; }
  body.force-mobile #top-left-submit { font-size: 18px; padding: 8px 15px; left: 10px; top: 10px; background: #000; }
  body.force-mobile .stat-grid { grid-template-columns: 1fr; gap: 15px; }
  body.force-mobile .subject-stats-grid { grid-template-columns: 1fr; }
  body.force-mobile .finish-btn.bottom-center { padding: 12px 25px; font-size: 16px; bottom: 15px; }
  body.force-mobile .finish-btn.side-sticky { right: 0; font-size: 12px; padding: 15px 5px; }
  body.force-mobile .explanation-box:hover { transform: none; } 
  body.force-mobile .action-btn-group { flex-direction: column; }
  body.force-mobile #arif-wm { font-size: 10px; letter-spacing: 1px; bottom: 10px; opacity: 0.6; }
  @media (max-width: 768px) { #arif-wm { font-size: 10px; letter-spacing: 1px; bottom: 10px; opacity: 0.6; } }

  #import-section { max-width: 600px; margin: 20px auto; padding: 20px; background: rgba(22, 27, 34, 0.6); border-radius: 15px; border: 1px solid var(--border); }
  #base64-input { width: 100%; height: 80px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(245,166,35,0.4); border-radius: 10px; padding: 10px; font-family: 'Outfit'; resize: vertical; }
  .load-btn { padding: 10px 25px; font-size: 16px; font-weight: bold; background: transparent; border: 2px solid var(--accent); color: var(--accent); border-radius: 30px; cursor: pointer; margin-top: 15px; transition: all 0.3s; }
  .load-btn:hover { background: var(--accent); color: #000; }

</style>
</head>
<body>

<div class="bg-grid"></div>

<div id="arif-wm" class="wm-right">Made By ARIF</div>

<div id="home-page" class="page-container">
  <div class="glow-orb"></div>
  <h1 class="main-title">সাপ্তাহিক মূল্যায়ন - ০২</h1>
  <p style="color: #a3b3c4; font-size: 20px; font-weight: 600; letter-spacing: 1px; margin-bottom: 5px;">BCS & Bank Standard Full Model Test</p>
  
  <p id="total-marks" style="color: var(--accent); font-size: 28px; font-family: 'Tiro Bangla', serif; font-weight: 700; margin-top: 0; text-shadow: 0 2px 15px rgba(245,166,35,0.4);">পূর্ণমান: 0</p>

  <div class="toggle-container">
    <span style="color:#fff;">Desktop View</span>
    <label class="switch">
      <input type="checkbox" id="device-toggle" onchange="toggleDeviceView()">
      <span class="slider"></span>
    </label>
    <span style="color:var(--accent);">Mobile View (Light)</span>
  </div>
  
  <div id="import-section">
    <textarea id="base64-input" placeholder="Paste your Base64 question code here..."></textarea>
    <br>
    <button class="load-btn" onclick="importQuestions()">Load Questions</button>
  </div>

  <div id="user-info-section" style="max-width: 600px; margin: 20px auto; padding: 20px; background: rgba(22, 27, 34, 0.6); border-radius: 15px; border: 1px solid var(--border);">
    <input type="text" id="user-name" placeholder="পরীক্ষা শুরু করতে আপনার নাম লিখুন..." style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--accent); background: #000; color: #fff; font-family: 'Hind Siliguri'; font-size: 16px; outline: none;">
  </div>

  <div class="subject-grid" id="dynamic-subject-grid"></div>

  <button id="start-exam-btn" class="start-btn" style="display: none;" onclick="startExam()">পরীক্ষা শুরু করুন</button>
</div>

<div id="timer-wrapper"><span id="timer">60:00</span></div>
<button id="top-left-submit" onclick="finishExam()">SUBMIT</button>

<div id="exam-area" class="page-container hidden-anim" style="display:none; max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 100px;">
  <div id="subject-headline">বাংলা</div>
  <div id="questions-container"></div>
  
  <button class="finish-btn side-sticky" onclick="finishExam()">SUBMIT</button>
  <button class="finish-btn bottom-center" onclick="finishExam()">SUBMIT</button>
</div>

<div id="result-page" class="page-container hidden-anim" style="display:none; padding: 20px;">
  <div class="result-container">
    <div class="score-header">
      <h2 style="color: var(--accent); margin: 0; font-size: 32px; font-family:'Outfit'">PERFORMANCE SCORECARD</h2>
    </div>

    <div class="toggle-container" style="margin: 0 auto 30px auto;">
      <span>Negative Marking (-0.25)</span>
      <label class="switch">
        <input type="checkbox" id="neg-toggle" checked onchange="updateScoreBoard()">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="liquid-score-wrapper">
      <div class="score-text-overlay" id="liquid-score-text">0</div>
      <div class="liquid-wave" id="liquid-wave"></div>
    </div>
    
    <div class="stat-grid">
      <div class="stat-card" style="border-color: #238636; box-shadow: 0 0 20px rgba(35,134,54,0.05);">
        <span class="stat-value" id="stat-correct" style="color:var(--correct)">0</span><small>Correct Answers</small>
      </div>
      <div class="stat-card" id="wrong-card" style="border-color: #da3633; box-shadow: 0 0 20px rgba(218,54,51,0.05);">
        <span class="stat-value" id="stat-wrong" style="color:var(--wrong)">0</span><small id="penalty-text">Wrong (Penalty)</small>
      </div>
      <div class="stat-card" style="border-color: var(--accent); box-shadow: 0 0 20px rgba(245,166,35,0.05);">
        <span class="stat-value" id="stat-score" style="color:var(--accent)">0.0</span><small>Final Score</small>
      </div>
    </div>

    <div class="subject-stats-grid" id="subject-stats-grid"></div>
  </div>

  <div style="max-width: 800px; margin: 40px auto; padding-bottom: 80px;">
    
    <div class="action-btn-group" style="margin-bottom: 30px;">
      <button id="btn-show-all" class="btn-3d btn-green active-glow" onclick="filterReview('all')">Show All Explanations</button>
      <button id="btn-show-wrong" class="btn-3d btn-red dimmed" onclick="filterReview('wrong')">Review Wrong Only</button>
    </div>

    <div id="review-container"></div>
    
    <button class="story-btn" onclick="showReceipt()">📸 Share to Story</button>

    <button class="start-btn" style="display: block; margin: 40px auto 0; padding: 15px 50px; border-radius: 50px; font-size: 22px; width: fit-content;" onclick="location.reload()">RETAKE EXAM</button>

  </div>
</div>

<div id="receipt-overlay" onclick="closeReceipt(event)">
    <p style="color:var(--accent); font-weight: 800; font-family: 'Outfit'; margin-bottom: 20px; text-shadow: 0 0 10px rgba(245,166,35,0.5);">📸 TAKE A SCREENSHOT</p>
    <div class="story-receipt" id="story-receipt" onclick="event.stopPropagation()">
        </div>
    <button style="margin-top: 30px; background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'" onclick="closeReceipt({target: {id: 'receipt-overlay'}})">CLOSE</button>
</div>

<script>
// --- GLOBAL VARIABLES --- //
const manifestObj = { name: "Pro Exam Portal", short_name: "ExamPortal", display: "standalone", background_color: "#090c10", theme_color: "#f5a623", icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2Y1YTYyMyIvPjwvc3ZnPg==", sizes: "192x192", type: "image/svg+xml" }] };
const manifestBlob = new Blob([JSON.stringify(manifestObj)], { type: 'application/manifest+json' });
document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

if ('serviceWorker' in navigator) {
  const swCode = `self.addEventListener('install', (e) => e.waitUntil(self.skipWaiting())); self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim())); self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request).catch(() => new Response('Offline Mode Active. Use local file.'))); });`;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW registration failed'));
}

function toggleDeviceView() {
  const isMobile = document.getElementById('device-toggle').checked;
  if (isMobile) { document.body.classList.add('force-mobile'); } else { document.body.classList.remove('force-mobile'); }
}

let db = [];
let timeLeft = 3600;
let timerInt;
let headlineTimeout;
let TOTAL_TIME = 3600;
let globalCorrect = 0;
let globalWrong = 0;

// 🛡️ NEW: DATA PERSISTENCE VARIABLES
let savedAnswers = {};

// 🛡️ NEW: ADVANCED INITIALIZATION LOGIC (Handles Page Refreshes)
window.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const urlData = urlParams.get('data');
  const savedData = localStorage.getItem('last_exam_db');
  const activeExam = localStorage.getItem('examActive');

  if (activeExam === 'true' && savedData) {
      // 🚨 USER REFRESHED MID-EXAM! RESTORING STATE...
      db = JSON.parse(savedData);
      TOTAL_TIME = db.length * 36;
      timeLeft = parseInt(localStorage.getItem('timeLeft')) || TOTAL_TIME;
      savedAnswers = JSON.parse(localStorage.getItem('savedAnswers') || '{}');
      
      const savedName = localStorage.getItem('userName');
      if (savedName) document.getElementById('user-name').value = savedName;

      // Jump straight to Exam View
      document.getElementById('home-page').style.display = 'none';
      document.getElementById('exam-area').style.display = 'block';
      document.getElementById('exam-area').classList.remove('hidden-anim');
      
      const wmEl = document.getElementById('arif-wm');
      wmEl.classList.remove('wm-right');
      wmEl.classList.add('wm-left');

      const tw = document.getElementById('timer-wrapper');
      const tls = document.getElementById('top-left-submit');
      tw.style.display = 'block'; tls.style.display = 'block';
      setTimeout(() => { tw.style.opacity = '1'; tls.style.opacity = '1'; }, 50);

      render();
      
      // Auto-check saved answers
      for (let qName in savedAnswers) {
          const radio = document.querySelector(`input[name="${qName}"][value="${savedAnswers[qName]}"]`);
          if (radio) radio.checked = true;
      }

      startTimer();
      setupObserver();

  } else if (urlData) {
      document.getElementById('base64-input').value = urlData;
      importQuestions(true); 
  } else if (savedData) {
      db = JSON.parse(savedData);
      renderHomePageStats();
  }
  
  setupDragAndDrop();
});

function setupDragAndDrop() {
  const dropZone = document.getElementById('import-section');
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; dropZone.style.background = 'rgba(245, 166, 35, 0.1)'; });
  dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; dropZone.style.background = 'rgba(22, 27, 34, 0.6)'; });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault(); dropZone.style.borderColor = 'var(--border)'; dropZone.style.background = 'rgba(22, 27, 34, 0.6)';
    const file = e.dataTransfer.files[0];
    if (file) { const reader = new FileReader(); reader.onload = (event) => { document.getElementById('base64-input').value = event.target.result; importQuestions(); }; reader.readAsText(file); }
  });
}

function renderHomePageStats() {
  const grid = document.getElementById('dynamic-subject-grid');
  const startBtn = document.getElementById('start-exam-btn');
  const totalMarks = document.getElementById('total-marks');
  grid.innerHTML = '';
  
  if (db.length === 0) {
    totalMarks.innerText = 'পূর্ণমান: 0'; startBtn.style.display = 'none';
    grid.innerHTML = '<p style="color: var(--muted); font-size: 18px; width: 100%;">Please paste your Base64 code and click "Load Questions" to view subjects.</p>'; return;
  }

  startBtn.style.display = 'inline-block'; totalMarks.innerText = `পূর্ণমান: ${db.length}`;
  let categoryCounts = {};
  db.forEach(item => { categoryCounts[item.cat] = (categoryCounts[item.cat] || 0) + 1; });
  for(let cat in categoryCounts) { grid.innerHTML += `<div class="sub-card"><b>${cat}</b><span>${categoryCounts[cat]}টি প্রশ্ন</span></div>`; }
}

function importQuestions(silent = false) {
  const input = document.getElementById('base64-input').value.trim();
  if(!input) { if(!silent) alert('Please paste a Base64 string first.'); return; }
  try {
    let parsedData;
    if (input.startsWith('[')) { parsedData = JSON.parse(input); } else {
      try { const binary = atob(input); const bytes = new Uint8Array(binary.length); for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); } parsedData = JSON.parse(new TextDecoder('utf-8').decode(bytes)); } catch (e) { parsedData = JSON.parse(decodeURIComponent(escape(atob(input)))); }
    }
    if(Array.isArray(parsedData) && parsedData.length > 0) {
      db = parsedData; localStorage.setItem('last_exam_db', JSON.stringify(db)); renderHomePageStats(); document.getElementById('base64-input').value = ''; 
      if(!silent) alert(`সফলভাবে ${db.length}টি প্রশ্ন ইমপোর্ট হয়েছে!`); 
    } else { if(!silent) alert('Invalid structure! Please ensure your JSON is formatted correctly.'); }
  } catch(e) { if(!silent) alert('ভুল কোড! দয়া করে সঠিক Base64 কোডটি দিন। (Error decoding string)'); }
}

function fadeTransition(oldId, newId) {
  const oldEl = document.getElementById(oldId); const newEl = document.getElementById(newId);
  oldEl.classList.add('hidden-anim');
  setTimeout(() => { oldEl.style.display = 'none'; newEl.style.display = 'block'; setTimeout(() => { newEl.classList.remove('hidden-anim'); window.scrollTo({ top: 0, behavior: 'smooth' }); }, 50); }, 500); 
}

function startExam() {
  const userName = document.getElementById('user-name').value.trim();
  if (!userName) { alert("দয়া করে পরীক্ষা শুরু করার আগে আপনার নাম লিখুন।"); return; }

  // 🛡️ NEW: LOCK IN THE SESSION FOR PERSISTENCE
  localStorage.setItem('userName', userName);
  localStorage.setItem('examActive', 'true');
  savedAnswers = {};
  localStorage.setItem('savedAnswers', JSON.stringify(savedAnswers));

  TOTAL_TIME = db.length * 36;
  timeLeft = TOTAL_TIME;

  fadeTransition('home-page', 'exam-area');
  const wmEl = document.getElementById('arif-wm'); wmEl.classList.remove('wm-right'); wmEl.classList.add('wm-left');

  setTimeout(() => {
    const tw = document.getElementById('timer-wrapper'); const tls = document.getElementById('top-left-submit');
    tw.style.display = 'block'; tls.style.display = 'block';
    setTimeout(() => { tw.style.opacity = '1'; tls.style.opacity = '1'; }, 50);
  }, 500);

  render();
  startTimer();
  setupObserver();
}

function startTimer() {
  const timerEl = document.getElementById('timer');
  const timerWrapper = document.getElementById('timer-wrapper');
  const submitBtns = document.querySelectorAll('.finish-btn'); 

  timerInt = setInterval(() => {
    // 🛡️ NEW: SAVE TIME PROGRESS CONSTANTLY
    localStorage.setItem('timeLeft', timeLeft);

    let m = Math.floor(timeLeft/60), s = timeLeft%60;
    timerEl.innerText = `${m}:${s<10?'0':''}${s}`;
    
    let pct = timeLeft / TOTAL_TIME;
    if (pct > 0.5) { timerWrapper.style.borderColor = '#238636'; timerWrapper.style.boxShadow = '0 4px 15px rgba(35,134,54,0.3)'; }
    else if (pct > 0.15) { timerWrapper.style.borderColor = '#d29922'; timerWrapper.style.boxShadow = '0 4px 15px rgba(210,153,34,0.3)'; }
    else { timerWrapper.style.borderColor = '#da3633'; timerWrapper.style.boxShadow = '0 4px 20px rgba(218,54,51,0.5)'; }

    let elapsed = TOTAL_TIME - timeLeft;
    let isLast5Mins = timeLeft <= 300;
    
    if (isLast5Mins) {
      submitBtns.forEach(btn => btn.style.opacity = '1'); document.body.classList.add('red-alert');
      if (timeLeft % 60 === 0 && timeLeft !== 0) submitBtns.forEach(triggerHeartbeat);
    } else {
      submitBtns.forEach(btn => btn.style.opacity = '0.5'); document.body.classList.remove('red-alert');
      if (elapsed % 300 === 0 && elapsed !== 0) submitBtns.forEach(triggerHeartbeat);
    }

    if(timeLeft <= 0) finishExam();
    timeLeft--;
  }, 1000);
}

function triggerHeartbeat(btn) { btn.classList.add('heartbeat-active'); setTimeout(() => btn.classList.remove('heartbeat-active'), 1500); }

function render() {
  const container = document.getElementById('questions-container');
  container.innerHTML = ''; 
  const frag = document.createDocumentFragment();
  
  db.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card'; card.dataset.cat = item.cat; card.id = `QC-${idx}`;
    card.innerHTML = `
      <div style="color:var(--accent); font-weight:800; font-family:'Outfit'; margin-bottom:10px;">${item.cat} // Question ${idx+1}</div>
      <span class="question-text">${item.q}</span>
      ${item.o.map((opt, i) => `
        <label class="option-label" id="LBL-${idx}-${i}">
          <input type="radio" name="Q${idx}" value="${i}"> ${opt}
        </label>
      `).join('')}
      <div id="E-${idx}" class="explanation-box">${item.e}</div>
    `;
    frag.appendChild(card);
  });
  container.appendChild(frag);

  // 🛡️ NEW: LISTENERS TO AUTO-SAVE ANSWERS
  document.querySelectorAll('input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
          savedAnswers[e.target.name] = e.target.value;
          localStorage.setItem('savedAnswers', JSON.stringify(savedAnswers));
      });
  });
}

function setupObserver() {
  const headline = document.getElementById('subject-headline');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        headline.innerText = entry.target.dataset.cat; headline.style.opacity = 1;
        clearTimeout(headlineTimeout); headlineTimeout = setTimeout(() => { headline.style.opacity = 0; }, 500);
      }
    });
  }, { threshold: 0.5 });
  document.querySelectorAll('.question-card').forEach(c => observer.observe(c));
}

function sendDataToAdmin(name, correct, wrong, score, totalMarks) {
  const botToken = "8639913733:AAEn1DFme4k25sDPWq1kDASGBmUYHCD01Lo"; 
  const chatId = "7962568160";     
  
  const skipped = totalMarks - correct - wrong;
  const percentage = (score / totalMarks) * 100;
  
  // 💀 NEW: GEN Z DYNAMIC SLANG RATINGS
  let rating = "Cooked 💀";
  if (percentage >= 80) rating = "Absolute GOAT 🐐";
  else if (percentage >= 50) rating = "Locked In 🔒";

  const dateObj = new Date();
  const dateStr = dateObj.toLocaleDateString('en-GB') + " " + dateObj.toLocaleTimeString('en-GB');

  const message = `🎯 *New Exam Result*\n\n📅 *Date:* ${dateStr}\n👤 *Name:* ${name}\n📝 *Total Marks:* ${totalMarks}\n✅ *Right:* ${correct}\n❌ *Wrong:* ${wrong}\n⏭️ *Skip:* ${skipped}\n🏆 *Final Score:* ${score}\n🌟 *Vibe Check:* ${rating}`;

  const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage`;
  fetch(telegramUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' }) }).then(() => console.log("Result sent to Telegram!")).catch(err => console.error("Error sending data:", err));
}

function finishExam() {
  clearInterval(timerInt);
  document.body.classList.remove('red-alert');
  
  // 🛡️ NEW: EXAM IS OVER, CLEAR THE MID-EXAM SAVE DATA
  localStorage.removeItem('examActive');
  localStorage.removeItem('timeLeft');
  localStorage.removeItem('savedAnswers');

  fadeTransition('exam-area', 'result-page');
  const wmEl = document.getElementById('arif-wm'); wmEl.classList.remove('wm-left'); wmEl.classList.add('wm-right');
  document.getElementById('timer-wrapper').style.opacity = '0'; document.getElementById('top-left-submit').style.opacity = '0';
  setTimeout(() => { document.getElementById('timer-wrapper').style.display = 'none'; document.getElementById('top-left-submit').style.display = 'none'; }, 500);
  
  globalCorrect = 0; globalWrong = 0;
  let subs = {}; db.forEach(item => { if(!subs[item.cat]) subs[item.cat] = {c:0, t:0}; subs[item.cat].t++; });

  db.forEach((item, idx) => {
    const card = document.getElementById(`QC-${idx}`); card.classList.add('review-mode'); 
    const sel = document.querySelector(`input[name="Q${idx}"]:checked`);
    document.getElementById(`LBL-${idx}-${item.a}`).classList.add('correct-ans');

    if(sel) {
      if(parseInt(sel.value) === item.a) { globalCorrect++; subs[item.cat].c++; } 
      else { globalWrong++; document.getElementById(`LBL-${idx}-${sel.value}`).classList.add('wrong-ans'); card.classList.add('has-mistake'); }
    } else { card.classList.add('has-mistake'); }
  });

  updateScoreBoard();

  const subGrid = document.getElementById('subject-stats-grid'); subGrid.innerHTML = ''; 
  for(let key in subs) {
    let stat = subs[key]; let pct = (stat.c / stat.t) * 100;
    let gradient = pct > 75 ? "linear-gradient(90deg, #00c6ff, #0072ff)" : pct > 40 ? "linear-gradient(90deg, #11998e, #38ef7d)" : "linear-gradient(90deg, #ff416c, #ff4b2b)";
    subGrid.innerHTML += `<div class="sub-stat-box"><p>${key} <span style="float:right">${stat.c}/${stat.t}</span></p><div class="water-bar"><div class="water-fill" style="width: 0%; background: ${gradient};"></div></div></div>`;
  }
  
  setTimeout(() => { const fills = document.querySelectorAll('.water-fill'); let i = 0; for(let key in subs) { fills[i].style.width = ((subs[key].c / subs[key].t) * 100) + '%'; i++; } }, 700); 
  document.getElementById('review-container').appendChild(document.getElementById('questions-container'));

  const userName = document.getElementById('user-name').value.trim();
  const usePenalty = document.getElementById('neg-toggle').checked;
  const finalScore = (globalCorrect - (usePenalty ? (globalWrong * 0.25) : 0)).toFixed(1);
  const totalMarks = db.length;
  
  sendDataToAdmin(userName, globalCorrect, globalWrong, finalScore, totalMarks);
}

function updateScoreBoard() {
  const usePenalty = document.getElementById('neg-toggle').checked;
  const score = globalCorrect - (usePenalty ? (globalWrong * 0.25) : 0);
  
  document.getElementById('stat-correct').innerText = globalCorrect; document.getElementById('stat-wrong').innerText = globalWrong; document.getElementById('stat-score').innerText = score.toFixed(1);
  const penaltyText = document.getElementById('penalty-text'); const wrongCard = document.getElementById('wrong-card'); const wave = document.getElementById('liquid-wave');

  if(usePenalty) {
      penaltyText.innerHTML = `Wrong (-${(globalWrong * 0.25).toFixed(2)})`; wrongCard.style.borderColor = '#da3633'; wrongCard.style.boxShadow = '0 0 20px rgba(218,54,51,0.1)'; wave.style.background = 'rgba(245, 166, 35, 0.85)';
  } else {
      penaltyText.innerHTML = "Wrong (No Penalty)"; wrongCard.style.borderColor = '#8b949e'; wrongCard.style.boxShadow = 'none'; wave.style.background = 'rgba(35, 134, 54, 0.85)'; 
  }

  let scorePct = Math.max(0, (score / db.length)); document.getElementById('liquid-score-text').innerText = score.toFixed(1); wave.style.top = (100 - (scorePct * 100)) + '%';
}

function filterReview(mode) {
    const cards = document.querySelectorAll('.question-card.review-mode'); const btnAll = document.getElementById('btn-show-all'); const btnWrong = document.getElementById('btn-show-wrong');
    if(mode === 'all') { btnAll.classList.add('active-glow'); btnAll.classList.remove('dimmed'); btnWrong.classList.add('dimmed'); btnWrong.classList.remove('active-glow'); } 
    else if (mode === 'wrong') { btnWrong.classList.add('active-glow'); btnWrong.classList.remove('dimmed'); btnAll.classList.add('dimmed'); btnAll.classList.remove('active-glow'); }
    cards.forEach(card => {
        const expBox = card.querySelector('.explanation-box');
        if(mode === 'all') { card.style.display = 'block'; expBox.style.display = 'block'; } 
        else if (mode === 'wrong') { if(card.classList.contains('has-mistake')) { card.style.display = 'block'; expBox.style.display = 'block'; } else { card.style.display = 'none'; } }
    });
}

// 📸 NEW: STORY RECEIPT GENERATOR FUNCTION
function showReceipt() {
    const userName = document.getElementById('user-name').value.trim() || "Genius";
    const scoreText = document.getElementById('stat-score').innerText;
    const percentage = (parseFloat(scoreText) / db.length) * 100;
    
    let rating = "Cooked 💀"; let emoji = "💀";
    if (percentage >= 80) { rating = "Absolute GOAT 🐐"; emoji = "🔥"; }
    else if (percentage >= 50) { rating = "Locked In 🔒"; emoji = "🎯"; }

    const d = new Date(); const dateStr = d.toLocaleDateString('en-GB');

    document.getElementById('story-receipt').innerHTML = `
        <div style="font-size: 50px; margin-bottom: -10px;">${emoji}</div>
        <h2 style="font-size: 28px; color: var(--accent); letter-spacing: 2px; margin-bottom: 5px;">EXAM WRAPPED</h2>
        <p style="color: var(--muted); font-size: 14px; margin-top: 0;">${dateStr}</p>
        
        <div class="receipt-lines"></div>
        <h3 style="font-size: 22px; font-weight: 800; margin: 0;">👤 ${userName}</h3>
        <div class="receipt-lines"></div>
        
        <div style="width: 80%; display: flex; justify-content: space-between; margin: 10px 0; font-size: 16px;">
            <span style="color: #8b949e;">Total Questions</span><span style="font-weight: bold;">${db.length}</span>
        </div>
        <div style="width: 80%; display: flex; justify-content: space-between; margin: 10px 0; font-size: 16px;">
            <span style="color: #8b949e;">Correct Answers</span><span style="color: var(--correct); font-weight: bold;">${globalCorrect}</span>
        </div>
        <div style="width: 80%; display: flex; justify-content: space-between; margin: 10px 0; font-size: 16px;">
            <span style="color: #8b949e;">Wrong Answers</span><span style="color: var(--wrong); font-weight: bold;">${globalWrong}</span>
        </div>
        
        <div class="receipt-lines"></div>
        
        <p style="font-size: 16px; color: #8b949e; margin-bottom: 0;">Final Score</p>
        <h1 style="font-size: 55px; margin: 0; color: var(--accent); text-shadow: 0 4px 20px rgba(245,166,35,0.4);">${scoreText}</h1>
        
        <div class="receipt-lines"></div>
        
        <p style="font-size: 14px; color: #8b949e; letter-spacing: 2px; margin-bottom: 0;">VIBE CHECK</p>
        <h2 style="font-size: 26px; margin-top: 5px; font-weight: 900;">${rating}</h2>
        
        <div style="position: absolute; bottom: 15px; width: 100%; text-align: center; opacity: 0.3; font-family: monospace; font-size: 12px; letter-spacing: 5px;">
            ||| | || ||| | ||| | || |
        </div>
    `;
    
    const overlay = document.getElementById('receipt-overlay');
    overlay.style.display = 'flex';
    setTimeout(() => { overlay.style.opacity = '1'; }, 50);
}

function closeReceipt(e) {
    if(e.target.id === 'receipt-overlay') {
        const overlay = document.getElementById('receipt-overlay');
        overlay.style.opacity = '0'; setTimeout(() => { overlay.style.display = 'none'; }, 400);
    }
}
</script>
</body>
</html>
